services:
  db:
    image: pgvector/pgvector:pg16
    container_name: multi-agent-orchestrator
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-business_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-business_pass}
      POSTGRES_DB: ${POSTGRES_DB:-business_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: multi-agent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-business_admin}:${POSTGRES_PASSWORD:-business_pass}@db:5432/${POSTGRES_DB:-business_db}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db

  frontend:
    build: frontend/
    container_name: multi-agent-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
